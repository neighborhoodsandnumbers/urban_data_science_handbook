# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Urban Data Science Handbook
author: A.C. Shannon-Ding
logo: images/general/nyc.png

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: force
  timeout: 30
  run_in_temp: true
  before_notebook: |
    import plot_config
    plot_config.setup_plot_style()

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/executablebooks/jupyter-book  # Online location of your book
  path_to_book: docs  # Optional path to your book, relative to the repository root
  branch: master  # Which branch of the repository should be used when creating links (optional)

html:
  extra_css:
    - _static/tufte.css
  # extra_javascript:
  #   - _static/custom.js
  use_issues_button: true
  use_repository_button: true
  home_page_in_navbar: true
  use_edit_page_button: true
  favicon: images/general/city2.png
  use_fullscreen_button: false
  comments:
    hypothesis: false
    
sphinx:
  extra_extensions:
    - sphinxext.opengraph
  config:
    ogp_site_url: "https://goodresearch.dev/"
    ogp_image: "https://goodresearch.dev/_images/unicorn.png"
    ogp_description_length: 200